<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>CALCULATOR</title>
</head>
<body>
    <div class="container">
        <div id="display">
            <div id="previous-operand" class="previous-operand"></div>
            <div id="current-operand" class="current-operand"></div>
        </div>
        <button id="clear" class="span-two" onclick="clearDisplay()">AC</button>
        <button id="delete" onclick="deleteLast()">DEL</button>
        <button data-number onclick="appendToDisplay('.')">.</button>
        <button data-operation="/" class="operationBtn" onclick="appendToDisplay('÷')">÷</button>
        <button data-number onclick="appendToDisplay('9')">9</button>
        <button data-number onclick="appendToDisplay('8')">8</button>
        <button data-number onclick="appendToDisplay('7')">7</button>
        <button data-operation="*" class="operationBtn" onclick="appendToDisplay('×')">×</button>
        <button data-number onclick="appendToDisplay('6')">6</button>
        <button data-number onclick="appendToDisplay('5')">5</button>
        <button data-number onclick="appendToDisplay('4')">4</button>
        <button data-operation="-" class="operationBtn" onclick="appendToDisplay('-')">-</button>
        <button data-number onclick="appendToDisplay('3')">3</button>
        <button data-number onclick="appendToDisplay('2')">2</button>
        <button data-number onclick="appendToDisplay('1')">1</button>
        <button data-operation="+" class="operationBtn" onclick="appendToDisplay('+')">+</button>
        <button data-number onclick="appendToDisplay('0')">0</button>
        <button id="equals" class="span-two" onclick="calculate()">=</button>
    </div>

    <div>
      <footer class="footer">
           <p>&copy; 2026 Fortune U. Emmanuel. All rights reserved.</p>
       </footer>
    </div>
    

    <script defer src="app.js"></script>
</body>
</html>
