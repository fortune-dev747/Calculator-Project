<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>CALCULATOR</title>
</head>
<body>
    <div class="container">
        <div class="display">
            <div id="previous-operand" class="previous-operand"></div>
            <div id="current-operand" class="current-operand"></div>
        </div>
        <button id="clear" class="span-two">AC</button>
        <button id="delete">DEL</button>
        <button data-number>.</button>
        <button data-operation="/" class="operationBtn">÷</button>
        <button data-number>9</button>
        <button data-number>8</button>
        <button data-number>7</button>
        <button data-operation="*" class="operationBtn">×</button>
        <button data-number>6</button>
        <button data-number>5</button>
        <button data-number>4</button>
        <button data-operation="-" class="operationBtn">-</button>
        <button data-number>3</button>
        <button data-number>2</button>
        <button data-number>1</button>
        <button data-operation="+" class="operationBtn">+</button>
        <button data-number>0</button>
        <button id="equals" class="span-two">=</button>
    </div>

    <div>
      <footer class="footer">
           <p>&copy; 2026 Fortune U. Emmanuel. All rights reserved.</p>
       </footer>
    </div>
    

    <script defer src="app.js"></script>
</body>
</html>
